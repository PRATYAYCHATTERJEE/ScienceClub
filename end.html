<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Quiz Session Ended</title>

<style>

/* ===== RESET ===== */

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui;
}

/* ===== BODY ===== */

body{
background:#000;
color:white;
overflow:hidden;
}

/* ===== HERO SECTION ===== */

.hero{
position:relative;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
overflow:hidden;
}

/* ===== VIDEO BACKGROUND ===== */

.hero video{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
min-width:100%;
min-height:100%;
object-fit:cover;
opacity:0.35;
z-index:0;
}

/* ===== DARK OVERLAY ===== */

.hero::after{
content:"";
position:absolute;
inset:0;
background:linear-gradient(
to bottom,
rgba(0,0,0,0.4),
rgba(0,0,0,0.85)
);
z-index:1;
}

/* ===== CONTENT ===== */

.hero-content{
position:relative;
z-index:2;
max-width:900px;
padding:40px;
}

/* ===== HEADING ===== */

.hero h1{
font-size:64px;
line-height:1.2;
margin-bottom:25px;

background:linear-gradient(90deg,#ff00ff,#8b5cf6,#008cff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:fadeUp 1s ease;
}

/* ===== SUBTEXT ===== */

.hero p{
font-size:20px;
color:#d1d5db;
margin-bottom:40px;
}

/* ===== BUTTON ===== */

.btn{
display:inline-block;
padding:14px 36px;
border-radius:40px;
border:none;
cursor:pointer;
color:white;
font-weight:600;
font-size:16px;

background:linear-gradient(135deg,#ff00ff,#008cff);

transition:.35s;
}

.btn:hover{
transform:scale(1.1);

box-shadow:
0 0 25px rgba(255,0,255,.6),
0 0 45px rgba(0,140,255,.4);
}

/* ===== ANIMATION ===== */

@keyframes fadeUp{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>


<body>

<section class="hero">

<!-- VIDEO PART OF BACKGROUND -->
<video autoplay muted loop playsinline>
<source src="assets/quiz-ended.mp4" type="video/mp4">
</video>

<!-- CONTENT -->
<div class="hero-content">

<h1>OOPS! This Quiz Session is Already Ended</h1>

<p>
The quiz is no longer active. But don't worry — more exciting challenges are coming soon 🚀
</p>

<button class="btn" onclick="history.back()">
Go Back Home
</button>

</div>

</section>

</body>
</html>
